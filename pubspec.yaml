name: second_brain
description: "Second Brain - Save Everything. Find Anything. A personal knowledge management app."
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.10.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Database
  drift: ^2.23.0
  sqlite3_flutter_libs: ^0.5.30
  path_provider: ^2.1.5
  path: ^1.9.1

  # Key-Value Store
  hive_flutter: ^1.1.0

  # Navigation
  go_router: ^14.6.3

  # Code Generation Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Rich Text Editor
  flutter_quill: ^11.5.0

  # File & Media
  file_picker: ^11.0.2
  image_picker: ^1.1.2

  # Audio
  record: ^6.2.1
  just_audio: ^0.9.43

  # Networking (bookmark metadata fetch)
  http: ^1.2.2

  # URL Launcher
  url_launcher: ^6.3.1

  # PDF Viewer
  flutter_pdfview: ^1.3.4

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  shared_preferences: ^2.3.5

  # Animations
  flutter_animate: ^4.5.2

  # Icons
  material_symbols_icons: ^4.2804.0

  # Image caching (favicons)
  cached_network_image: ^3.4.1

  # Connectivity
  connectivity_plus: ^6.1.2

  # Mime types
  mime: ^2.0.0

  cupertino_icons: ^1.0.8
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.15
  drift_dev: ^2.23.0
  freezed: ^2.5.8
  json_serializable: ^6.9.5
  riverpod_generator: ^2.6.4

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/icon.png
